stages:
  - build
  - package

variables:
  # 定义服务端实际运行的绝对路径（WSL和生产服保持一致）
  SERVER_PATH: "/project/azeroth-server"
  # 拉取代码时顺便拉取 modules 下的子模块
  GIT_SUBMODULE_STRATEGY: recursive

# ==========================================
# 1. 编译与本地部署阶段 (在 WSL 上执行)
# ==========================================
build_and_deploy_wsl:
  stage: build
  tags:
    - test # 你的 WSL Runner 标签
  when: manual # 设为手动触发，防止每次 push 自动跑编译
  script:
    - mkdir -p build
    - cd build
    # 获取 CPU 核心数减 1 作为编译并发数
    - export BUILD_CORES=$(awk 'BEGIN{print '"$(nproc --all)"'-1}')
    - if [ "$BUILD_CORES" -lt "1" ]; then export BUILD_CORES=1; fi
    - echo "Compiling with $BUILD_CORES cores..."
    # 编译并安装到 CI 工作目录下的 install 文件夹
    - >
      cmake ../ 
      -DCMAKE_INSTALL_PREFIX=$CI_PROJECT_DIR/install 
      -DCONF_DIR=$SERVER_PATH/etc 
      -DCMAKE_C_COMPILER=/usr/bin/clang 
      -DCMAKE_CXX_COMPILER=/usr/bin/clang++ 
      -DWITH_WARNINGS=1 
      -DTOOLS_BUILD=all 
      -DSCRIPTS=static 
      -DMODULES=static
    - make -j$BUILD_CORES
    - make install
    
    # ------------------------------------------
    # 第一步：WSL 本地秒级部署
    # ------------------------------------------
    - echo "Syncing compiled binaries locally to $SERVER_PATH..."
    - mkdir -p $SERVER_PATH/bin $SERVER_PATH/etc $SERVER_PATH/lib $SERVER_PATH/include
    - cd $CI_PROJECT_DIR  # 返回项目根目录
    - rsync -av --delete install/bin/ $SERVER_PATH/bin/
    
    # 配置文件现在直接安装到了 SERVER_PATH/etc，所以 install 下可能没有 etc 目录了
    - if [ -d "install/etc" ]; then rsync -av --include="*/" --include="*.dist" --exclude="*" install/etc/ $SERVER_PATH/etc/; else echo "install/etc not found, skipping config sync as it was installed directly to target."; fi
    
    - rsync -av --delete install/lib/ $SERVER_PATH/lib/ || true
    - rsync -av --delete install/include/ $SERVER_PATH/include/ || true
    
    # 将 WSL 的 data/sql 同步过去
    - echo "Setting up SQL updates directory..."
    - mkdir -p $SERVER_PATH/data/sql
    - rsync -av --delete data/sql/ $SERVER_PATH/data/sql/

    # 在 WSL 执行官方的 Config Merger 工具
    - echo "Running Config Merger for WSL..."
    - cd apps/config-merger/python
    - python3 config_merger.py $SERVER_PATH/etc both -y
    - python3 config_merger.py $SERVER_PATH/etc modules -y

# ==========================================
# 2. 制作离线发布包阶段
# ==========================================
create_offline_package:
  stage: package
  tags:
    - test # 依然在 WSL Runner 上执行，因为它拥有完整的源码和编译产物
  when: manual # 只有在你确认本地 WSL 跑得没问题时，再手动点击打包
  variables:
    GIT_STRATEGY: none # 这个阶段不需要再拉代码了，直接用本地的工作区
  script:
    # ------------------------------------------
    # 从本地部署目录收集文件并制作离线部署包
    # ------------------------------------------
    - echo "Creating offline release package from $SERVER_PATH..."
    - cd /tmp
    - rm -rf release_package  # 清理可能残留的旧包目录
    - mkdir -p release_package
    
    # 直接从你的 WSL 本地部署目录拷贝程序和库
    - cp -r $SERVER_PATH/bin release_package/
    - cp -r $SERVER_PATH/lib release_package/ || true
    - cp -r $SERVER_PATH/include release_package/ || true
    
    # 配置文件：从服务器 etc 下只拷贝 .dist 模板，不拷贝你的真实配置文件！
    - mkdir -p release_package/etc
    - find $SERVER_PATH/etc/ -name "*.dist" -exec cp {} release_package/etc/ \;
    
    # 复制 SQL 和配置合并脚本
    - mkdir -p release_package/data release_package/apps
    - cp -r $SERVER_PATH/data/sql release_package/data/
    
    # 由于 config-merger 脚本你可能没有部署到 SERVER_PATH 下，我们从项目代码中拷贝它
    - cp -r $CI_PROJECT_DIR/apps/config-merger release_package/apps/
    
    # 生成自动化覆盖部署脚本 deploy.sh
    - |
      cat << 'EOF' > release_package/deploy.sh
      #!/bin/bash
      SERVER_PATH="/project/azeroth-server"
      echo "================================================"
      echo "  Starting AzerothCore deployment to $SERVER_PATH"
      echo "================================================"
      
      mkdir -p $SERVER_PATH/bin $SERVER_PATH/etc $SERVER_PATH/lib $SERVER_PATH/include $SERVER_PATH/data/sql
      
      echo "1. Updating binaries and libraries..."
      cp -r bin/* $SERVER_PATH/bin/
      [ -d "lib" ] && cp -r lib/* $SERVER_PATH/lib/
      [ -d "include" ] && cp -r include/* $SERVER_PATH/include/
      
      echo "2. Updating config templates..."
      [ -d "etc" ] && cp -r etc/* $SERVER_PATH/etc/
      
      echo "3. Updating SQL files..."
      rsync -av --delete data/sql/ $SERVER_PATH/data/sql/
      
      echo "4. Running Config Merger..."
      # 这里我们在远程服务器也使用项目自带的 config-merger 脚本
      cd apps/config-merger/python
      python3 config_merger.py $SERVER_PATH/etc both -y
      python3 config_merger.py $SERVER_PATH/etc modules -y
      
      echo "================================================"
      echo "  Deployment completed successfully!"
      echo "================================================"
      EOF
    - chmod +x release_package/deploy.sh
    
    # 打包成压缩文件，加入精确到分钟的时间戳，并存放到 /project 目录下供你取用
    - echo "Compressing release package..."
    - export TIMESTAMP=$(date +"%Y%m%d_%H%M")
    - export RELEASE_FILE="/project/azerothcore-release_${TIMESTAMP}.tar.gz"
    - tar -czvf $RELEASE_FILE -C /tmp/release_package .
    - echo "Release package created successfully at -> $RELEASE_FILE"