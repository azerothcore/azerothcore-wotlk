stages:
  - build
  - deploy_wsl
  - deploy_prod

variables:
  # 定义服务端实际运行的绝对路径（WSL和生产服保持一致）
  SERVER_PATH: "/project/azeroth-server"
  # 拉取代码时顺便拉取 modules 下的子模块
  GIT_SUBMODULE_STRATEGY: recursive

# ==========================================
# 1. 编译阶段 (在 WSL 上执行)
# ==========================================
build_wsl:
  stage: build
  tags:
    - test # 你的 WSL Runner 标签
  when: manual # 设为手动触发，防止每次 push 自动跑编译
  script:
    - mkdir -p build
    - cd build
    # 获取 CPU 核心数减 1 作为编译并发数
    - export BUILD_CORES=$(awk 'BEGIN{print '"$(nproc --all)"'-1}')
    - if [ "$BUILD_CORES" -lt "1" ]; then export BUILD_CORES=1; fi
    - echo "Compiling with $BUILD_CORES cores..."
    # 编译并安装到 CI 工作目录下的 install 文件夹
    - >
      cmake ../ 
      -DCMAKE_INSTALL_PREFIX=$CI_PROJECT_DIR/install 
      -DCONF_DIR=$SERVER_PATH/etc 
      -DCMAKE_C_COMPILER=/usr/bin/clang 
      -DCMAKE_CXX_COMPILER=/usr/bin/clang++ 
      -DWITH_WARNINGS=1 
      -DTOOLS_BUILD=all 
      -DSCRIPTS=static 
      -DMODULES=static
    - make -j$BUILD_CORES
    - make install
    
    # 编译完成后，直接在本地 WSL 环境中同步到运行目录，省去上传 Artifacts 和 deploy_wsl 的等待
    - echo "Syncing compiled binaries locally to $SERVER_PATH..."
    - mkdir -p $SERVER_PATH/bin $SERVER_PATH/etc $SERVER_PATH/lib $SERVER_PATH/include
    - cd $CI_PROJECT_DIR  # 返回项目根目录，因为上面我们在 build/ 目录里
    - rsync -av --delete install/bin/ $SERVER_PATH/bin/
    - rsync -av --include="*/" --include="*.dist" --exclude="*" install/etc/ $SERVER_PATH/etc/
    - rsync -av --delete install/lib/ $SERVER_PATH/lib/ || true
    - rsync -av --delete install/include/ $SERVER_PATH/include/ || true
    
  artifacts:
    paths:
      - install/bin/
      - install/etc/
      - install/lib/
      - install/include/
    expire_in: 1 week

# ==========================================
# 2. 部署到 WSL 测试环境
# ==========================================
deploy_to_wsl:
  stage: deploy_wsl
  tags:
    - test # 在同一个 WSL 机器上部署
  when: manual # 设为手动触发，不再自动覆盖
  script:
    - echo "Deploying binaries and configs to WSL Server ($SERVER_PATH)..."
    - mkdir -p $SERVER_PATH/bin $SERVER_PATH/etc
    
    # 因为 build_wsl 阶段已经完成了本地文件的直接拷贝，
    # 这里我们不再依赖 Artifacts 来同步二进制文件（防止被精简过符号的 strip 文件覆盖本地用于调试的完整文件）
    - echo "Skipping binary sync in deploy_wsl, as it's handled locally during build_wsl."
    
    # 3. 解决 SQL 更新目录依赖问题：将源代码里的 data/sql 同步到部署目录
    - echo "Setting up SQL updates directory..."
    - mkdir -p $SERVER_PATH/data/sql
    - rsync -av --delete data/sql/ $SERVER_PATH/data/sql/

    # 4. 执行官方的 Config Merger 工具
    - echo "Running Config Merger..."
    - cd apps/config-merger/python
    - python3 config_merger.py $SERVER_PATH/etc both -y
    - python3 config_merger.py $SERVER_PATH/etc modules -y

  environment:
    name: wsl-testing
  # 移除强制依赖，允许单独运行
  # needs:
  #   - build_wsl
  # 尝试下载当前流水线的产物（如果有的话）
  dependencies:
    - build_wsl

# ==========================================
# 3. 部署到生产环境
# ==========================================
deploy_to_prod:
  stage: deploy_prod
  tags:
    - prod # 生产服务器的 Runner 标签
  when: manual # 必须手动点击才能部署到生产环境
  script:
    - echo "Deploying binaries and configs to Production Server ($SERVER_PATH)..."
    - mkdir -p $SERVER_PATH/bin
    - mkdir -p $SERVER_PATH/etc
    
    # 1. 如果有新的编译产物，就同步二进制文件和库文件
    - |
      if [ -d "install/bin" ]; then
        echo "Found new build artifacts, syncing binaries..."
        rsync -av --delete install/bin/ $SERVER_PATH/bin/
        if [ -d "install/lib" ]; then
          mkdir -p $SERVER_PATH/lib
          rsync -av --delete install/lib/ $SERVER_PATH/lib/
        fi
        if [ -d "install/include" ]; then
          mkdir -p $SERVER_PATH/include
          rsync -av --delete install/include/ $SERVER_PATH/include/
        fi
      else
        echo "No new build artifacts found. Skipping binary sync."
      fi
    
    # 2. 如果有新的编译产物，就同步 .dist 配置模板
    - |
      if [ -d "install/etc" ]; then
        echo "Found new build artifacts, syncing configs..."
        rsync -av --include="*/" --include="*.dist" --exclude="*" install/etc/ $SERVER_PATH/etc/
      else
        echo "No new build artifacts found. Skipping config sync."
      fi

    # 3. 将 Artifacts 里的 data/sql 同步到部署目录
    - echo "Setting up SQL updates directory..."
    - mkdir -p $SERVER_PATH/data/sql
    - rsync -av --delete data/sql/ $SERVER_PATH/data/sql/

    # 4. 合并配置文件
    - echo "Running Config Merger on Production..."
    - cd apps/config-merger/python
    - python3 config_merger.py $SERVER_PATH/etc both -y
    - python3 config_merger.py $SERVER_PATH/etc modules -y

  environment:
    name: production
  # 移除强制依赖，允许单独运行
  # needs:
  #   - build_wsl
  # 尝试下载当前流水线的产物（如果有的话）
  dependencies:
    - build_wsl