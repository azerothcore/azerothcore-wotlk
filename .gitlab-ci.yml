stages:
  - build
  - deploy_wsl
  - deploy_prod

variables:
  # 定义服务端实际运行的绝对路径（WSL和生产服保持一致）
  SERVER_PATH: "/project/azeroth-server"
  # 拉取代码时顺便拉取 modules 下的子模块
  GIT_SUBMODULE_STRATEGY: recursive

# ==========================================
# 1. 编译阶段 (在 WSL 上执行)
# ==========================================
build_wsl:
  stage: build
  tags:
    - test # 你的 WSL Runner 标签
  when: manual # 设为手动触发，防止每次 push 自动跑编译
  script:
    - mkdir -p build
    - cd build
    # 获取 CPU 核心数减 1 作为编译并发数
    - export BUILD_CORES=$(awk 'BEGIN{print '"$(nproc --all)"'-1}')
    - if [ "$BUILD_CORES" -lt "1" ]; then export BUILD_CORES=1; fi
    - echo "Compiling with $BUILD_CORES cores..."
    # 编译并安装到 CI 工作目录下的 install 文件夹
    - >
      cmake ../ 
      -DCMAKE_INSTALL_PREFIX=$CI_PROJECT_DIR/install 
      -DCMAKE_C_COMPILER=/usr/bin/clang 
      -DCMAKE_CXX_COMPILER=/usr/bin/clang++ 
      -DWITH_WARNINGS=1 
      -DTOOLS_BUILD=all 
      -DSCRIPTS=static 
      -DMODULES=static
    - make -j$BUILD_CORES
    - make install
    # 提取构建产物，由于二进制太大超过 GitLab 默认限制，我们不再走 Artifacts
    # artifacts:
    #   paths:
    #     - install/bin/
    #     - install/etc/
    #   expire_in: 1 week

# ==========================================
# 2. 部署到 WSL 测试环境
# ==========================================
deploy_to_wsl:
  stage: deploy_wsl
  tags:
    - test # 在同一个 WSL 机器上部署
  when: manual # 设为手动触发，不再自动覆盖
  script:
    - echo "Deploying binaries and configs to WSL Server ($SERVER_PATH)..."
    - mkdir -p $SERVER_PATH/bin
    - mkdir -p $SERVER_PATH/etc
    
    # 1. 直接从上一步的编译目录同步二进制文件（因为在同一台机器上，可以直接读取）
    - rsync -av --delete install/bin/ $SERVER_PATH/bin/
    
    # 2. 同步最新的 .dist 配置模板到 etc 目录
    - rsync -av --include="*/" --include="*.dist" --exclude="*" install/etc/ $SERVER_PATH/etc/

    # 3. 解决 SQL 更新目录依赖问题：将编译源码的 data/sql 同步到部署目录
    # 这里我们不再使用软链接，而是直接用 rsync 复制一份过去。
    # 这不仅能让本地 WSL 脱离对源码的依赖，也为未来同样逻辑推送生产服打下基础。
    - echo "Setting up SQL updates directory..."
    - mkdir -p $SERVER_PATH/data/sql
    - rsync -av --delete $CI_PROJECT_DIR/data/sql/ $SERVER_PATH/data/sql/

    # 4. 执行官方的 Config Merger 工具
    - echo "Running Config Merger..."
    - cd apps/config-merger
    - python3 config_merger.py --path $SERVER_PATH/etc --all --apply

  environment:
    name: wsl-testing
  # 移除 dependencies，因为我们不再依赖 GitLab artifacts，而是直接在同一机器上通过文件系统读取
  # dependencies:
  #   - build_wsl

# ==========================================
# 3. 部署到生产环境
# ==========================================
deploy_to_prod:
  stage: deploy_prod
  tags:
    - prod # 生产服务器的 Runner 标签
  when: manual # 必须手动点击才能部署到生产环境
  script:
    - echo "Deploying binaries and configs to Production Server ($SERVER_PATH)..."
    - mkdir -p $SERVER_PATH/bin
    - mkdir -p $SERVER_PATH/etc
    
    # 注意：因为没有了 Artifacts，要跨机器部署到 prod 服务器，
    # 必须使用 SSH rsync，或者在 prod 服务器上也跑一遍 build 步骤。
    # 这里我们演示通过 SCP/RSYNC 从 WSL 传到 Prod (需要配置 SSH 免密)
    # 如果暂未配置，这一步可能会失败。
    - echo "Please configure SSH keys if you want to push directly from CI runner to Prod"
    # - rsync -avze ssh install/bin/ root@prod_ip:$SERVER_PATH/bin/
    # - rsync -avze ssh --include="*/" --include="*.dist" --exclude="*" install/etc/ root@prod_ip:$SERVER_PATH/etc/
    
    # 同样需要把 data/sql 拷贝过去
    # - rsync -avze ssh data/sql/ root@prod_ip:$SERVER_PATH/data/sql/

  environment:
    name: production