name: Build NostrumWoW Worldserver

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

jobs:
  build-worldserver:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout AzerothCore fork
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Prepare Dockerfile
        run: |
          cat > Dockerfile.worldserver <<'EOF'
          FROM ubuntu:24.04 AS build

          ENV DEBIAN_FRONTEND=noninteractive

          RUN apt-get update && apt-get install -y \
              build-essential \
              cmake \
              file \
              clang \
              libmysqlclient-dev \
              libssl-dev \
              libboost-all-dev \
              libreadline-dev \
              zlib1g-dev \
              libbz2-dev \
              libncurses-dev \
              git \
              && rm -rf /var/lib/apt/lists/*

          WORKDIR /azerothcore-src

          COPY . .

          RUN mkdir -p build && \
              cd build && \
              cmake .. \
                -DCMAKE_BUILD_TYPE=RelWithDebInfo \
                -DCMAKE_INSTALL_PREFIX=/opt/azerothcore/env/dist \
                -DTOOLS=0 \
                -DSCRIPTS=static && \
              cmake --build . --target worldserver -- -j$(nproc)

          RUN mkdir -p /tmp/worldserver-build && \
              echo "Searching for compiled worldserver binary..." && \
              find build -name "worldserver" -print -exec ls -lah {} \; || true && \
              WORLD_BIN="$(find build -type f -name worldserver -perm /111 | head -n 1)" && \
              if [ -z "$WORLD_BIN" ]; then \
                echo "Executable worldserver binary not found"; \
                find build -name "worldserver" -print -exec file {} \; || true; \
                exit 1; \
              fi && \
              echo "Using binary: $WORLD_BIN" && \
              cp "$WORLD_BIN" /tmp/worldserver-build/worldserver && \
              chmod +x /tmp/worldserver-build/worldserver && \
              file /tmp/worldserver-build/worldserver

          FROM acore/ac-wotlk-worldserver:master

          USER root

          RUN apt-get update && apt-get install -y \
              libboost-filesystem1.83.0 \
              libboost-system1.83.0 \
              libboost-program-options1.83.0 \
              libboost-iostreams1.83.0 \
              libboost-regex1.83.0 \
              libboost-thread1.83.0 \
              libmysqlclient21 \
              libssl3 \
              && rm -rf /var/lib/apt/lists/*

          COPY --from=build /tmp/worldserver-build/worldserver /azerothcore/env/dist/bin/worldserver

          RUN chmod +x /azerothcore/env/dist/bin/worldserver && \
              chown acore:acore /azerothcore/env/dist/bin/worldserver

          USER acore
          EOF

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.worldserver
          push: true
          tags: |
            dockerdan247/nostrum-worldserver:latest
            dockerdan247/nostrum-worldserver:${{ github.sha }}
